<!DOCTYPE html>

<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>O Incrível Mundo Digital</title>

    <style>

        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; width: 100vw; height: 100vh; }

        canvas { display: block; width: 100%; height: 100%; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: white; text-align: center; }

        #game-menu { background: radial-gradient(circle, #002244 0%, #000 100%); }

        #death-screen { background: rgba(139, 0, 0, 0.9); display: none; }

        #cutscene-screen { background: #000; display: none; }

        #intro-video { width: 100%; height: 100%; object-fit: contain; }

        #skip-cutscene { position: absolute; bottom: 30px; right: 30px; padding: 10px 20px; font-size: 16px; min-width: auto; z-index: 1001; }

        h1 { font-size: 8vw; margin-bottom: 20px; text-shadow: 0 0 20px #00aaff; color: #9370DB; text-transform: uppercase; }

        .game-btn { padding: 15px 40px; font-size: 20px; font-weight: bold; color: white; background: #00aaff; border: 3px solid #fff; border-radius: 50px; cursor: pointer; transition: 0.3s; margin-top: 20px; min-width: 200px; }

        #control-selection { display: none; flex-direction: column; gap: 15px; margin-top: 20px; }

        #ui-layer { display: none; }

        #health-container { position: absolute; top: 20px; right: 75px; width: 150px; height: 20px; background: rgba(0, 0, 0, 0.5); border: 2px solid #fff; border-radius: 10px; overflow: hidden; z-index: 100; }

        #health-bar { width: 100%; height: 100%; background: #ff0000; transition: 0.3s; }

        #stamina-container { position: absolute; top: 45px; right: 75px; width: 150px; height: 10px; background: rgba(0, 0, 0, 0.5); border: 2px solid #fff; border-radius: 5px; overflow: hidden; z-index: 100; }

        #stamina-bar { width: 100%; height: 100%; background: #00ff00; transition: 0.1s; }

        #settings-trigger { position: absolute; top: 15px; right: 15px; width: 45px; height: 45px; background: rgba(255, 255, 255, 0.2); border: 2px solid #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; z-index: 100; cursor: pointer; }

        #settings-menu { position: absolute; top: 70px; right: 15px; width: 180px; background: rgba(0, 0, 0, 0.9); border-radius: 12px; padding: 15px; display: none; flex-direction: column; color: white; z-index: 101; }

        #joystick-wrapper { position: absolute; bottom: 30px; left: 30px; width: 100px; height: 100px; background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 50%; display: none; align-items: center; justify-content: center; }

        #joystick-handle { width: 40px; height: 40px; background: white; border-radius: 50%; pointer-events: none; }

        #jump-btn { position: absolute; bottom: 30px; right: 30px; width: 70px; height: 70px; background: rgba(255, 255, 255, 0.2); border: 2px solid #fff; border-radius: 50%; color: white; font-weight: bold; display: none; align-items: center; justify-content: center; z-index: 100; cursor: pointer; user-select: none; }

        #sprint-btn { position: absolute; bottom: 115px; right: 30px; width: 70px; height: 70px; background: rgba(255, 100, 100, 0.3); border: 2px solid #fff; border-radius: 50%; color: white; font-weight: bold; display: none; align-items: center; justify-content: center; z-index: 100; cursor: pointer; user-select: none; }

        #emoji-trigger { position: absolute; top: 15px; left: 15px; width: 45px; height: 45px; background: rgba(255, 255, 255, 0.2); border: 2px solid #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; z-index: 100; cursor: pointer; font-size: 20px; }

        #shop-trigger { position: absolute; top: 75px; left: 15px; width: 45px; height: 45px; background: rgba(255, 255, 255, 0.2); border: 2px solid #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; z-index: 100; cursor: pointer; font-size: 20px; }

        #coin-container { position: absolute; top: 15px; left: 70px; height: 41px; background: rgba(255, 255, 255, 0.2); border: 2px solid #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; z-index: 100; padding: 0 10px; font-size: 20px; font-weight: bold; user-select: none; }

        #coin-count { margin-left: 5px; }

        #emoji-menu { position: absolute; top: 15px; left: 180px; background: rgba(255, 255, 255, 0.9); border-radius: 12px; padding: 10px; display: none; flex-direction: row; gap: 10px; z-index: 101; box-shadow: 0 0 10px rgba(0,0,0,0.5); }

        .emoji-btn { font-size: 26px; cursor: pointer; user-select: none; transition: transform 0.2s; }

        .emoji-btn:active { transform: scale(1.2); }

        #shop-menu { position: absolute; top: 75px; left: 70px; background: rgba(255, 255, 255, 0.9); border-radius: 12px; padding: 10px; display: none; flex-direction: column; gap: 10px; z-index: 101; box-shadow: 0 0 10px rgba(0,0,0,0.5); width: 160px; height: 300px; overflow-y: auto; }

        .shop-btn { padding: 10px; font-size: 16px; font-weight: bold; color: white; text-align: center; border: 2px solid #000; border-radius: 10px; cursor: pointer; transition: 0.2s; flex-shrink: 0; }

        #btn-jax { background: #9370DB; } #btn-pomni { background: #e3242b; } #btn-gangle { background: #cc0000; } #btn-kinger { background: #4B0082; } #btn-zooble { background: #008080; } #btn-ragatha { background: #d35400; }


        #glosma-ui, #doce-ui { display: none; position: absolute; top: 20px; left: 50%; transform: translateX(-50%); text-align: center; color: white; z-index: 100; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; pointer-events: none; }

        #glosma-timer-text { font-size: 32px; font-weight: bold; color: #FFD700; }

        #glosma-count-text { font-size: 22px; font-weight: bold; color: #32CD32; margin-top: 5px; }

       

        #doce-timer-text { font-size: 38px; font-weight: bold; color: #FF69B4; text-shadow: 3px 3px 0 #000; }

        #btn-sair-doce { pointer-events: auto; background: #ff0000; font-size: 16px; padding: 10px 20px; margin-top: 10px; border: 2px solid #fff; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }


        /* Estilo do Balão de Emoji */

        .speech-bubble { position: absolute; display: none; font-size: 40px; background: white; border: 3px solid black; border-radius: 20px; padding: 5px 15px; pointer-events: none; z-index: 2000; box-shadow: 2px 2px 10px rgba(0,0,0,0.5); text-shadow: none; }

        .speech-bubble::after { content: ''; position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%); border-width: 12px 12px 0; border-style: solid; border-color: white transparent transparent transparent; }

        .speech-bubble::before { content: ''; position: absolute; bottom: -16px; left: 50%; transform: translateX(-50%); border-width: 14px 14px 0; border-style: solid; border-color: black transparent transparent transparent; z-index: -1; }

    </style>

</head>
